name: CI/CD - Build, Push y Deploy

on:
  push:
    branches: [ main ]

jobs:
  # ── Job 1: Compilar con Maven ────────────────────────────
  build:
    name: Build Maven
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Build con Maven (sin tests)
        run: mvn clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: app-jar
          path: target/sistema-inscripcion-1.0.0.jar

  # ── Job 2: Publicar imagen en Docker Hub ────────────────
  docker-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Download JAR
        uses: actions/download-artifact@v3
        with:
          name: app-jar
          path: target/

      - name: Login a Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sistema-inscripcion:latest

  # ── Job 3: Desplegar en AWS EC2 ──────────────────────────
  deploy-ec2:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: docker-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Descargar imagen más reciente
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sistema-inscripcion:latest

            # Detener y eliminar contenedor anterior si existe
            docker stop inscripcion-app || true
            docker rm   inscripcion-app || true

            # Levantar nuevo contenedor
            docker run -d \
              --name inscripcion-app \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/sistema-inscripcion:latest

            echo "✅ Deploy completado exitosamente"
